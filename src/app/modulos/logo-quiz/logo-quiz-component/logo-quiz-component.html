<div class="h-[calc(100vh-80px)] overflow-hidden bg-white text-juego-texto font-sans selection:bg-juego-primario selection:text-white flex flex-col items-center">
    
    <main class="w-full max-w-7xl px-4 md:px-8 flex flex-col items-center justify-between h-full pt-2 pb-4">
        
        <div class="text-center w-full flex flex-col items-center shrink-0">
            <h2 class="text-4xl md:text-5xl font-black text-juego-oscuro italic tracking-tighter uppercase mb-1">
                LOGO <span class="text-juego-primario">QUIZ</span>
            </h2>
            
            <div class="flex gap-4 md:gap-8 justify-center items-center w-full max-w-2xl mt-1">
                <div class="bg-juego-suave px-6 py-1 md:py-2 rounded-full border-4 border-juego-primario shadow-[4px_4px_0px_0px_rgba(20,83,45,1)] flex-1 text-center">
                    <p class="text-juego-oscuro font-black uppercase text-sm md:text-base tracking-wider flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-red-500" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        Vidas: <span class="text-juego-primario text-lg md:text-xl ml-1">{{ vidas() }}</span>
                    </p>
                </div>
                <div class="bg-juego-suave px-6 py-1 md:py-2 rounded-full border-4 border-juego-primario shadow-[4px_4px_0px_0px_rgba(20,83,45,1)] flex-1 text-center">
                    <p class="text-juego-oscuro font-black uppercase text-sm md:text-base tracking-wider">
                        Puntos: <span class="text-juego-primario text-lg md:text-xl ml-2">{{ puntaje() }}</span>
                    </p>
                </div>
            </div>
        </div>

        <div class="text-center w-full shrink-0 mt-2 mb-1">
            <h3 class="text-lg md:text-xl font-black uppercase tracking-widest text-juego-texto">
                ¿Cuál es el logo real de <span class="text-juego-primario">{{ marcaActual() }}</span>?
            </h3>
        </div>

        <div class="w-full max-w-4xl flex-1 min-h-0 grid grid-cols-2 gap-3 md:gap-6 shrink p-1 pb-4">
            
            @for (opcion of opcionesActuales(); track $index) {
                <button (click)="elegirLogo(opcion)"
                        [disabled]="juegoTerminado() || mostrarFeedback()"
                        class="relative rounded-3xl border-[6px] shadow-[6px_6px_0px_0px_rgba(20,83,45,1)] transition-all overflow-hidden p-2 md:p-6 flex items-center justify-center group"
                        
                        [ngClass]="{
                            'bg-green-100 border-green-600': mostrarFeedback() && opcion.esCorrecto,
                            'bg-red-100 border-red-600': mostrarFeedback() && opcionElegida() === opcion && !opcion.esCorrecto,
                            'bg-white border-juego-oscuro hover:bg-juego-suave active:translate-y-1 active:shadow-none': !mostrarFeedback(),
                            'opacity-40': mostrarFeedback() && !opcion.esCorrecto && opcionElegida() !== opcion
                        }">
                    
                    <img [src]="opcion.imagen" alt="Opción de Logo" class="w-full h-full object-contain">

                    @if (mostrarFeedback()) {
                        @if (opcion.esCorrecto) {
                            <div class="absolute inset-0 bg-green-900/80 flex items-center justify-center animate-in fade-in zoom-in duration-300">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 fill-white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                            </div>
                        } @else if (opcionElegida() === opcion) {
                            <div class="absolute inset-0 bg-red-900/80 flex items-center justify-center animate-in fade-in zoom-in duration-300">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 fill-white" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                            </div>
                        }
                    }
                </button>
            }
        </div>

        @if (juegoTerminado()) {
            <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-juego-texto/90 backdrop-blur-sm">
                <div class="bg-[#e9e9e9] max-w-md w-full rounded-3xl p-8 text-center shadow-2xl animate-in zoom-in duration-300">
                    
                    <div class="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 border-[3px] bg-transparent"
                        [ngClass]="vidas() > 0 ? 'border-green-600 text-green-600' : 'border-red-600 text-red-600'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 fill-current" viewBox="0 0 24 24">
                            @if (vidas() > 0) {
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                            } @else {
                                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                            }
                        </svg>
                    </div>
                    
                    <h3 class="text-4xl md:text-5xl font-black uppercase italic mb-2 tracking-tighter"
                        [ngClass]="vidas() > 0 ? 'text-green-600' : 'text-red-600'">
                        {{ vidas() > 0 ? '¡VICTORIA!' : '¡GAME OVER!' }}
                    </h3>
                    
                    <p class="text-lg font-black text-juego-oscuro mb-4">
                        Puntaje final:
                    </p>

                    <div class="bg-green-200 rounded-2xl p-6 mb-6 border-2 border-green-500 shadow-inner">
                        <p class="text-xs uppercase font-black text-gray-500 tracking-widest mb-1">Total Obtenido</p>
                        <p class="text-6xl font-black text-green-600 tracking-tighter">{{ puntaje() }}</p>
                    </div>

                    <button (click)="iniciarJuego()" 
                            class="w-full mb-3 bg-[#22c55e] hover:bg-green-600 text-white font-black py-4 rounded-xl shadow-[0_6px_0_0_#14532d] active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest text-lg">
                        Intentar de nuevo
                    </button>
                    
                    <button (click)="volverAlHome()" 
                            class="w-full bg-[#f3f4f6] border-[3px] border-green-900 text-green-900 font-black py-3 rounded-xl hover:bg-gray-200 transition-all uppercase tracking-widest text-sm">
                        Volver a la Sala
                    </button>
                </div>
            </div>
        }
    </main>
</div>
